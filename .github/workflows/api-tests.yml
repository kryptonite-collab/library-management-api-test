name: API Tests

on:
  push:
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    env:
      PORT: 3001
      BASE_URL: http://localhost:3001
      SQLITE_DB_PATH: ../backend/prisma/prisma/dev.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Initialize SQLite database
        working-directory: backend
        run: |
          # CI uses a disposable SQLite database created from Prisma migrations.
          # If migrations or seed data drift from the schema, this step will fail.
          mkdir -p prisma/prisma
          rm -f prisma/prisma/dev.db
          npx prisma migrate deploy
          npx prisma db seed

      - name: Start backend service
        working-directory: backend
        run: |
          nohup node src/index.js > backend.log 2>&1 &

      - name: Wait for backend health check
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          cat backend/backend.log || true
          exit 1

      - name: Install API test dependencies
        working-directory: api-tests
        run: pip install -r requirements.txt

      - name: Run API tests and collect Allure results
        working-directory: api-tests
        run: pytest -v --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: api-tests/allure-results
          if-no-files-found: warn
