[pytest]
markers =
    smoke: core smoke tests for quick service checks
    books: book information API tests
    db: database validation tests
    consistency: API and database consistency tests
    flow: flow readiness and test data factory checks
    regression: regression test suite
    logs: audit log API tests
    contract: API response contract tests
    auth: authentication related tests
    permission: authorization and permission related tests
    negative: negative scenario tests
    security: security related tests
testpaths = tests
